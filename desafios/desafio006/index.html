<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>

<body>
    <p>Em HTML5 podemos, inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul>
        <li title="Use a tag p">Parágrafo</li>
        <li title="Use as tags h1 a h5">Títulos</li>
        <li title="Para imagens use a tag img">Imagens</li>
        <li title="Use a tag abbr">Abreviações</li>
        <li title="Use as tags pre e code">Código-fonte</li>
        <li title="Com tags ol e li">Listas numeradas</li>
        <li title="Use as tags ol, ul e li com o type">Listas com demarcações</li>
    </ul>
</body>

</html>
